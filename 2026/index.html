<!DOCTYPE html>
<html lang="id">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
    <script src="https://cdn.jsdelivr.net/npm/js-confetti@latest/dist/js-confetti.browser.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Great+Vibes&family=Dancing+Script:wght@500;700&family=Quicksand:wght@400;500;600;700&display=swap" rel="stylesheet">
    <!-- Spline 3D viewer (untuk halaman flower) -->
    <script type="module" src="https://unpkg.com/@splinetool/viewer@1.9.48/build/spline-viewer.js"></script>
    <title>4 YOU — 2026</title>
    <style>
        * { box-sizing: border-box; user-select: none; -webkit-user-select: none; }

        html, body { margin: 0; padding: 0; height: 100%; overflow: hidden; }
        body {
            font-family: 'Quicksand', sans-serif;
            color: #7a3b52;
            background: linear-gradient(160deg, #ffd9e8 0%, #ffc2d9 50%, #ffb3cd 100%);
        }

        .vibes   { font-family: 'Great Vibes', cursive; }
        .dancing { font-family: 'Dancing Script', cursive; }

        /* ===== View system (no scroll, click navigation) ===== */
        .view {
            position: fixed; inset: 0;
            display: flex; flex-direction: column; align-items: center; justify-content: center;
            opacity: 0; pointer-events: none; transition: opacity 0.6s ease;
            padding: 24px; text-align: center;
        }
        .view.active { opacity: 1; pointer-events: auto; }

        /* ===== Decorative white birthday attributes ===== */
        .deco { position: absolute; pointer-events: none; opacity: 0.95; }

        .balloon {
            position: absolute; width: 44px; height: 56px; background: #fff;
            border-radius: 50% 50% 50% 50%; opacity: 0.9; pointer-events: none;
            box-shadow: inset -6px -6px 0 rgba(255,180,205,0.25);
            animation: sway 6s ease-in-out infinite;
        }
        .balloon::before {
            content: ''; position: absolute; bottom: -6px; left: 50%; transform: translateX(-50%);
            border-left: 5px solid transparent; border-right: 5px solid transparent; border-top: 7px solid #fff;
        }
        .balloon::after {
            content: ''; position: absolute; bottom: -42px; left: 50%; width: 1px; height: 42px;
            background: rgba(255,255,255,0.7);
        }
        @keyframes sway { 0%,100% { transform: translateY(0) rotate(-4deg); } 50% { transform: translateY(-14px) rotate(4deg); } }

        .confetti-dot {
            position: absolute; width: 9px; height: 9px; background: #fff; opacity: 0.85;
            border-radius: 2px; animation: fall linear infinite; pointer-events: none;
        }
        @keyframes fall { to { transform: translateY(105vh) rotate(360deg); } }

        .spark { position: absolute; color: #fff; opacity: 0.9; animation: twinkle 2.5s ease-in-out infinite; }
        @keyframes twinkle { 0%,100% { opacity: 0.2; transform: scale(0.8); } 50% { opacity: 0.95; transform: scale(1.2); } }

        /* Garland at top */
        .garland { position: absolute; top: 0; left: 0; width: 100%; }

        /* ===== Buttons ===== */
        .continue-link {
            position: absolute; bottom: 40px; left: 50%; transform: translateX(-50%);
            color: #fff; font-weight: 600; font-size: 15px; cursor: pointer;
            display: flex; flex-direction: column; align-items: center; gap: 6px;
            text-shadow: 0 2px 8px rgba(214,93,143,0.4); animation: bob 2s ease-in-out infinite;
        }
        @keyframes bob { 0%,100% { transform: translate(-50%, 0); } 50% { transform: translate(-50%, 8px); } }
        .continue-link .chev { font-size: 26px; }

        .back-btn {
            position: fixed; top: 18px; left: 18px; z-index: 50;
            background: rgba(255,255,255,0.85); color: #fb6f92; border: none;
            padding: 9px 18px; border-radius: 999px; font-weight: 700; font-size: 13px; cursor: pointer;
            box-shadow: 0 4px 14px rgba(251,111,146,0.3); transition: transform 0.2s, background 0.2s;
        }
        .back-btn:hover { transform: translateX(-3px); background: #fff; }

        #music-toggle {
            position: fixed; bottom: 20px; right: 20px; z-index: 50;
            width: 50px; height: 50px; border-radius: 50%; border: none;
            background: rgba(255,255,255,0.9); color: #fb6f92; font-size: 22px; cursor: pointer;
            box-shadow: 0 6px 18px rgba(251,111,146,0.4); transition: transform 0.2s; display: none;
        }
        #music-toggle:hover { transform: scale(1.1); }
        #music-toggle.playing { animation: spin 4s linear infinite; }
        @keyframes spin { to { transform: rotate(360deg); } }

        /* ===== Menu cards ===== */
        .menu-grid {
            display: flex; flex-wrap: wrap; gap: 22px; justify-content: center; max-width: 760px;
        }
        .menu-card {
            width: 150px; height: 170px; background: rgba(255,255,255,0.92); border-radius: 24px;
            display: flex; flex-direction: column; align-items: center; justify-content: center; gap: 14px;
            cursor: pointer; box-shadow: 0 12px 30px rgba(251,111,146,0.25);
            transition: transform 0.25s ease, box-shadow 0.25s ease;
        }
        .menu-card:hover { transform: translateY(-8px); box-shadow: 0 20px 40px rgba(251,111,146,0.35); }
        .menu-card svg { width: 56px; height: 56px; }
        .menu-card span { font-weight: 700; color: #fb6f92; font-size: 15px; }

        /* entrance pop for cards */
        .pop-in { animation: popIn 0.5s ease both; }
        @keyframes popIn { from { opacity: 0; transform: scale(0.8) translateY(20px); } to { opacity: 1; transform: scale(1) translateY(0); } }

        spline-viewer { width: 100%; height: 100%; }

        /* Start overlay */
        #start {
            position: fixed; inset: 0; z-index: 60; display: flex; flex-direction: column;
            align-items: center; justify-content: center; gap: 16px;
            background: linear-gradient(160deg, #ffd9e8, #ffb3cd);
        }
    </style>
</head>

<body>

    <!-- Start overlay -->
    <div id="start">
        <div class="vibes text-5xl text-white" style="text-shadow:0 3px 10px rgba(214,93,143,.4)">2026</div>
        <button onclick="enter()" class="px-9 py-3 bg-white text-[#fb6f92] text-xl rounded-full font-bold" style="box-shadow:0 8px 22px rgba(251,111,146,.4)">
            Buka Kado 🎁
        </button>
    </div>

    <button id="music-toggle" title="Musik lo-fi">🎵</button>

    <!-- ============ VIEW 1: HAPPY BIRTHDAY ============ -->
    <section class="view" id="view-birthday">
        <!-- garland -->
        <svg class="garland" viewBox="0 0 1200 80" preserveAspectRatio="none" height="70">
            <path d="M0,10 Q300,70 600,18 T1200,12" stroke="#fff" stroke-width="2" fill="none" opacity="0.8"/>
            <g fill="#fff" opacity="0.9">
                <polygon points="100,16 118,16 109,40"/>
                <polygon points="260,34 278,34 269,58"/>
                <polygon points="430,30 448,30 439,54"/>
                <polygon points="600,20 618,20 609,44"/>
                <polygon points="770,30 788,30 779,54"/>
                <polygon points="940,34 958,34 949,58"/>
                <polygon points="1090,16 1108,16 1099,40"/>
            </g>
        </svg>

        <div class="dancing text-3xl md:text-4xl text-white mb-2" style="text-shadow:0 2px 8px rgba(214,93,143,.35)">08 - 06 - 2026</div>

        <h1 class="vibes text-white leading-none" style="font-size:clamp(64px,14vw,150px); text-shadow:0 6px 22px rgba(214,93,143,.45)">
            Happy Birthday
        </h1>

        <p class="dancing text-2xl md:text-3xl text-white mt-3" style="text-shadow:0 2px 8px rgba(214,93,143,.35)">
            i hope this little gift make you happy
        </p>

        <div class="continue-link" onclick="showView('menu')">
            <span>klik disini untuk lanjut ke halaman yang lain</span>
            <span class="chev">⌄</span>
        </div>
    </section>

    <!-- ============ VIEW 2: THESE ARE FOR YOU ============ -->
    <section class="view" id="view-menu">
        <button class="back-btn" onclick="showView('birthday')">← Kembali</button>

        <h2 class="vibes text-white mb-10" style="font-size:clamp(44px,9vw,80px); text-shadow:0 5px 18px rgba(214,93,143,.45)">
            These are for you
        </h2>

        <div class="menu-grid">
            <!-- Message -->
            <div class="menu-card pop-in" style="animation-delay:.05s" onclick="showView('message')">
                <svg viewBox="0 0 24 24" fill="none" stroke="#fb6f92" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round">
                    <rect x="2.5" y="5" width="19" height="14" rx="2.5"/>
                    <path d="M3 6.5l9 6 9-6"/>
                </svg>
                <span>Message</span>
            </div>

            <!-- Flower -->
            <div class="menu-card pop-in" style="animation-delay:.15s" onclick="showView('flower')">
                <svg viewBox="0 0 24 24" fill="none" stroke="#fb6f92" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round">
                    <circle cx="12" cy="9" r="2.2"/>
                    <path d="M12 6.8c0-2.2 1-3.3 2.3-3.3S16.6 5 15 6.6M12 6.8c0-2.2-1-3.3-2.3-3.3S7.4 5 9 6.6"/>
                    <path d="M14.2 9c2.2 0 3.3 1 3.3 2.3S15.4 13.6 13.8 12M9.8 9c-2.2 0-3.3 1-3.3 2.3S8.6 13.6 10.2 12"/>
                    <path d="M12 11.2V21M12 21c-2 0-4-1-5-2.5M12 21c2 0 4-1 5-2.5"/>
                </svg>
                <span>Flower</span>
            </div>

            <!-- Foto -->
            <div class="menu-card pop-in" style="animation-delay:.25s" onclick="showView('foto')">
                <svg viewBox="0 0 24 24" fill="none" stroke="#fb6f92" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round">
                    <rect x="3" y="4.5" width="18" height="15" rx="2.5"/>
                    <circle cx="9" cy="10" r="1.8"/>
                    <path d="M4 18l5-4 4 3 3-2.5 4 3.5"/>
                </svg>
                <span>Foto</span>
            </div>

            <!-- Lagu (disc) -->
            <div class="menu-card pop-in" style="animation-delay:.35s" onclick="showView('lagu')">
                <svg viewBox="0 0 24 24" fill="none" stroke="#fb6f92" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round">
                    <circle cx="12" cy="12" r="9"/>
                    <circle cx="12" cy="12" r="3.2"/>
                    <circle cx="12" cy="12" r="0.6" fill="#fb6f92"/>
                    <path d="M12 3a9 9 0 0 1 0 18" opacity="0.5"/>
                </svg>
                <span>Lagu</span>
            </div>
        </div>
    </section>

    <!-- ============ VIEW: MESSAGE (placeholder) ============ -->
    <section class="view" id="view-message">
        <button class="back-btn" onclick="showView('menu')">← Kembali</button>
        <div class="text-6xl mb-4">💌</div>
        <h2 class="vibes text-white mb-3" style="font-size:clamp(40px,8vw,70px); text-shadow:0 4px 14px rgba(214,93,143,.4)">Message</h2>
        <p class="dancing text-2xl text-white">Segera hadir 💕</p>
    </section>

    <!-- ============ VIEW: FLOWER ============ -->
    <section class="view" id="view-flower" style="padding:0;">
        <button class="back-btn" onclick="showView('menu')">← Kembali</button>
        <div style="position:absolute; inset:0;">
            <spline-viewer url="https://prod.spline.design/GKeXMIq-O6IlX04h/scene.splinecode" loading="lazy"></spline-viewer>
        </div>
        <div class="dancing text-2xl md:text-3xl text-white" style="position:absolute; top:24px; left:0; right:0; text-shadow:0 3px 10px rgba(214,93,143,.4); pointer-events:none;">
            A flower for you 🌸
        </div>
    </section>

    <!-- ============ VIEW: FOTO (placeholder) ============ -->
    <section class="view" id="view-foto">
        <button class="back-btn" onclick="showView('menu')">← Kembali</button>
        <div class="text-6xl mb-4">🖼️</div>
        <h2 class="vibes text-white mb-3" style="font-size:clamp(40px,8vw,70px); text-shadow:0 4px 14px rgba(214,93,143,.4)">Foto</h2>
        <p class="dancing text-2xl text-white">Segera hadir 💕</p>
    </section>

    <!-- ============ VIEW: LAGU (placeholder) ============ -->
    <section class="view" id="view-lagu">
        <button class="back-btn" onclick="showView('menu')">← Kembali</button>
        <div class="text-6xl mb-4">💿</div>
        <h2 class="vibes text-white mb-3" style="font-size:clamp(40px,8vw,70px); text-shadow:0 4px 14px rgba(214,93,143,.4)">Lagu</h2>
        <p class="dancing text-2xl text-white">Segera hadir 💕</p>
    </section>

    <script>
        // ---------- Build decorations on birthday view ----------
        (function () {
            const bday = document.getElementById('view-birthday');

            // balloons
            const balloonPos = [
                { left: '8%',  top: '18%' }, { left: '85%', top: '15%' },
                { left: '14%', top: '60%' }, { left: '80%', top: '58%' }
            ];
            balloonPos.forEach((p, i) => {
                const b = document.createElement('div');
                b.className = 'balloon';
                b.style.left = p.left; b.style.top = p.top;
                b.style.animationDelay = (i * 0.8) + 's';
                bday.appendChild(b);
            });

            // confetti dots (falling)
            for (let i = 0; i < 18; i++) {
                const d = document.createElement('div');
                d.className = 'confetti-dot';
                d.style.left = Math.random() * 100 + '%';
                d.style.top = (-10 - Math.random() * 30) + '%';
                d.style.animationDuration = (5 + Math.random() * 6) + 's';
                d.style.animationDelay = (Math.random() * 6) + 's';
                d.style.borderRadius = Math.random() > 0.5 ? '50%' : '2px';
                bday.appendChild(d);
            }

            // sparkles
            for (let i = 0; i < 10; i++) {
                const s = document.createElement('div');
                s.className = 'spark';
                s.textContent = '✦';
                s.style.left = Math.random() * 100 + '%';
                s.style.top = Math.random() * 100 + '%';
                s.style.fontSize = (10 + Math.random() * 14) + 'px';
                s.style.animationDelay = (Math.random() * 2.5) + 's';
                bday.appendChild(s);
            }
        })();

        // ---------- View navigation ----------
        let current = 'birthday';
        function showView(name) {
            const next = document.getElementById('view-' + name);
            const cur = document.getElementById('view-' + current);
            if (!next || name === current) return;
            cur.classList.remove('active');
            next.classList.add('active');
            current = name;
            startMusic();
        }
        window.showView = showView;

        // ---------- Lo-fi music ----------
        const lofi = new Audio('../asset/lofi.mp3');
        lofi.loop = true; lofi.volume = 0.35;
        const musicBtn = document.getElementById('music-toggle');
        let musicStarted = false;
        function startMusic() {
            if (musicStarted) return;
            lofi.play().then(() => { musicStarted = true; musicBtn.classList.add('playing'); }).catch(() => {});
        }
        musicBtn.addEventListener('click', () => {
            if (lofi.paused) { lofi.play().catch(() => {}); musicBtn.classList.add('playing'); }
            else { lofi.pause(); musicBtn.classList.remove('playing'); }
        });

        // ---------- Enter from start overlay ----------
        function enter() {
            document.getElementById('start').style.display = 'none';
            document.getElementById('view-birthday').classList.add('active');
            musicBtn.style.display = 'block';
            new JSConfetti().addConfetti({ confettiColors: ['#fff','#ffd6e7','#ffc2d4','#fb6f92','#ff8fab'] });
            new Audio('../asset/confetti.mp3').play().catch(() => {});
            startMusic();
        }
        window.enter = enter;
    </script>
</body>
</html>
